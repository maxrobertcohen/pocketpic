<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pocket Pic</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    #tap-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      cursor: pointer;
      transition: opacity 1s ease;
    }

    #tap-overlay span {
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: clamp(1rem, 4vw, 2rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(0,0,0,0.5);
      user-select: none;
    }

    #tap-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #debug {
      position: fixed;
      bottom: 10px;
      left: 10px;
      right: 10px;
      color: #fff;
      font-family: monospace;
      font-size: 12px;
      z-index: 10;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <video id="bg-video" autoplay muted loop playsinline>
    <source src="Irenas-pocket.mp4" type="video/mp4">
  </video>

  <div id="tap-overlay">
    <span>Tap to Start</span>
  </div>

  <div id="debug"></div>

  <script>
    (function () {
      const CROSSFADE_DURATION = 9; // seconds
      const AUDIO_SRC = 'MidnightHarpt.m4a';

      const overlay = document.getElementById('tap-overlay');
      const dbg = document.getElementById('debug');
      let started = false;
      let tracks = null;
      let current = 0;
      let fadeTimer = null;
      let fadeInterval = null;

      function log(msg) {
        dbg.textContent = msg;
        console.log(msg);
      }

      function scheduleNextCrossfade() {
        var track = tracks[current];
        var delay = (track.duration - CROSSFADE_DURATION - track.currentTime) * 1000;
        log('playing OK — duration ' + track.duration.toFixed(1) + 's, crossfade in ' + (delay/1000).toFixed(1) + 's');
        clearTimeout(fadeTimer);
        fadeTimer = setTimeout(doCrossfade, Math.max(0, delay));
      }

      function doCrossfade() {
        var outTrack = tracks[current];
        var nextIdx = current ^ 1;
        var inTrack = tracks[nextIdx];

        inTrack.volume = 0;
        inTrack.currentTime = 0;
        inTrack.play().catch(function(e) { log('crossfade play error: ' + e); });

        var startTime = Date.now();
        clearInterval(fadeInterval);
        fadeInterval = setInterval(function () {
          var progress = Math.min((Date.now() - startTime) / (CROSSFADE_DURATION * 1000), 1);
          outTrack.volume = 1 - progress;
          inTrack.volume = progress;

          if (progress >= 1) {
            clearInterval(fadeInterval);
            outTrack.pause();
            current = nextIdx;
            scheduleNextCrossfade();
          }
        }, 50);
      }

      // ── Start on first interaction ────────────────────────────────────────
      function handleStart() {
        if (started) return;
        started = true;

        // Create audio elements here, inside the gesture handler
        tracks = [new Audio(AUDIO_SRC), new Audio(AUDIO_SRC)];

        overlay.classList.add('hidden');
        log('tapped — calling play()');

        var track = tracks[current];
        track.volume = 1;
        var p = track.play();
        if (p && p.then) {
          p.then(function() {
            log('play() resolved');
          }).catch(function (e) {
            log('play() rejected: ' + e);
          });
        }

        track.addEventListener('loadedmetadata', scheduleNextCrossfade, { once: true });
        track.addEventListener('error', function(e) {
          log('audio error: ' + (track.error ? track.error.code + ' ' + track.error.message : e));
        });

        ['click', 'touchstart', 'keydown'].forEach(function (type) {
          document.removeEventListener(type, handleStart);
        });
      }

      ['click', 'touchstart', 'keydown'].forEach(function (type) {
        document.addEventListener(type, handleStart, { passive: true });
      });
    })();
  </script>

</body>
</html>
